apiVersion: v1
kind: ConfigMap
metadata:
  name: interview-coach-alertmanager-config
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m

    route:
      receiver: default
      group_by: ["alertname", "job"]
      group_wait: 10s
      group_interval: 30s
      repeat_interval: 4h

    receivers:
      - name: default
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: interview-coach-alertmanager
  labels:
    app.kubernetes.io/name: interview-coach
    app.kubernetes.io/component: alertmanager
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: interview-coach
      app.kubernetes.io/component: alertmanager
  template:
    metadata:
      labels:
        app.kubernetes.io/name: interview-coach
        app.kubernetes.io/component: alertmanager
    spec:
      containers:
        - name: alertmanager
          image: prom/alertmanager:v0.28.1
          imagePullPolicy: IfNotPresent
          args:
            - --config.file=/etc/alertmanager/alertmanager.yml
            - --storage.path=/alertmanager
          ports:
            - name: http
              containerPort: 9093
          volumeMounts:
            - name: config
              mountPath: /etc/alertmanager
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
      volumes:
        - name: config
          configMap:
            name: interview-coach-alertmanager-config
---
apiVersion: v1
kind: Service
metadata:
  name: interview-coach-alertmanager
  labels:
    app.kubernetes.io/name: interview-coach
    app.kubernetes.io/component: alertmanager
spec:
  selector:
    app.kubernetes.io/name: interview-coach
    app.kubernetes.io/component: alertmanager
  ports:
    - name: http
      port: 9093
      targetPort: http
