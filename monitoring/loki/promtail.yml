server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: interview-coach-app
    static_configs:
      - targets:
          - localhost
        labels:
          job: interview-coach-app
          service: interview-coach
          __path__: /var/log/interview-coach/*.log
