alertmanager:
  enabled: false

kube-state-metrics:
  enabled: false

prometheus-node-exporter:
  enabled: false

prometheus-pushgateway:
  enabled: false

server:
  fullnameOverride: prometheus
  persistentVolume:
    enabled: true
    size: 10Gi
    # storageClass: local-path

serverFiles:
  alerts.yml:
    groups: []
  prometheus.yml:
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    rule_files:
      - /etc/config/alerts.yml
    scrape_configs:
      - job_name: interview-coach-backend
        metrics_path: /api/actuator/prometheus
        static_configs:
          - targets:
              - interview-coach-backend.app.svc.cluster.local:8080
      - job_name: otel-collector
        static_configs:
          - targets:
              - otel-collector:8889
      - job_name: prometheus
        static_configs:
          - targets:
              - localhost:9090
