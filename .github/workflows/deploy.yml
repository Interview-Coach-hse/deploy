name: Deploy

on:
  push:
    branches:
      - main
    paths:
      - "helmfile.yaml"
      - "app/**"
      - "database/**"
      - "ingress-nginx/**"
      - "monitoring/**"
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy-over-ssh:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect changed stacks
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            app:
              - 'app/**'
              - 'database/**'
            infra:
              - 'ingress-nginx/**'
            monitoring:
              - 'monitoring/**'
            all:
              - 'helmfile.yaml'

      - name: Validate GitHub secrets
        shell: bash
        run: |
          missing=0
          [[ -n "${{ secrets.SSH_HOST }}" ]] || { echo "Missing secret: SSH_HOST"; missing=1; }
          [[ -n "${{ secrets.SSH_USER }}" ]] || { echo "Missing secret: SSH_USER"; missing=1; }
          [[ -n "${{ secrets.SSH_PRIVATE_KEY }}" ]] || { echo "Missing secret: SSH_PRIVATE_KEY"; missing=1; }

          if [[ "${missing}" -ne 0 ]]; then
            exit 1
          fi

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.0
        env:
          CHANGED_APP: ${{ steps.changes.outputs.app }}
          CHANGED_INFRA: ${{ steps.changes.outputs.infra }}
          CHANGED_MONITORING: ${{ steps.changes.outputs.monitoring }}
          CHANGED_ALL: ${{ steps.changes.outputs.all }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script_stop: true
          envs: CHANGED_APP,CHANGED_INFRA,CHANGED_MONITORING,CHANGED_ALL
          script: |
            set -euo pipefail
            cd ~/project/deploy
            git fetch origin
            git checkout main
            git pull --ff-only origin main
            helm version
            helmfile version
            if [ "${CHANGED_ALL}" = "true" ]; then
              helmfile sync
              exit 0
            fi

            if [ "${CHANGED_INFRA}" = "true" ]; then
              helmfile -l stack=infra sync
            fi

            if [ "${CHANGED_APP}" = "true" ]; then
              helmfile -l stack=app sync
            fi

            if [ "${CHANGED_MONITORING}" = "true" ]; then
              helmfile -l stack=monitoring sync
            fi
