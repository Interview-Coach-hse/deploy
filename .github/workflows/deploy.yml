name: Deploy

on:
  push:
    branches:
      - main
    paths:
      - "helmfile.yaml"
      - "app/**"
      - "database/**"
      - "ingress-nginx/**"
      - "monitoring/**"
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  helmfile-sync:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate GitHub secrets
        shell: bash
        run: |
          missing=0
          [[ -n "${{ secrets.KUBE_CONFIG }}" ]] || { echo "Missing secret: KUBE_CONFIG"; missing=1; }

          if [[ "${missing}" -ne 0 ]]; then
            exit 1
          fi

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Install helmfile
        shell: bash
        run: |
          HELMFILE_VERSION="0.168.0"
          curl -fsSL -o helmfile.tar.gz "https://github.com/helmfile/helmfile/releases/download/v${HELMFILE_VERSION}/helmfile_${HELMFILE_VERSION}_linux_amd64.tar.gz"
          tar -xzf helmfile.tar.gz helmfile
          chmod +x helmfile
          sudo mv helmfile /usr/local/bin/helmfile
          helmfile version

      - name: Configure kubeconfig
        shell: bash
        run: |
          mkdir -p "${HOME}/.kube"
          cat <<'EOF' > "${HOME}/.kube/config"
          ${{ secrets.KUBE_CONFIG }}
          EOF
          chmod 600 "${HOME}/.kube/config"

      - name: Sync cluster state
        run: helmfile sync
