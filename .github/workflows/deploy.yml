name: Deploy

on:
  push:
    branches:
      - main
    paths:
      - "helmfile.yaml"
      - "app/**"
      - "database/**"
      - "ingress-nginx/**"
      - "monitoring/**"
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy-over-ssh:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Validate GitHub secrets
        shell: bash
        run: |
          missing=0
          [[ -n "${{ secrets.SSH_HOST }}" ]] || { echo "Missing secret: SSH_HOST"; missing=1; }
          [[ -n "${{ secrets.SSH_USER }}" ]] || { echo "Missing secret: SSH_USER"; missing=1; }
          [[ -n "${{ secrets.SSH_PRIVATE_KEY }}" ]] || { echo "Missing secret: SSH_PRIVATE_KEY"; missing=1; }

          if [[ "${missing}" -ne 0 ]]; then
            exit 1
          fi

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script_stop: true
          script: |
            set -euo pipefail
            cd ~/project/deploy
            git fetch origin
            git checkout main
            git pull --ff-only origin main
            helm version
            helmfile version
            helmfile sync
