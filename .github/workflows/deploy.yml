name: Deploy

on:
  push:
    branches:
      - main
    paths:
      - "helmfile.yaml"
      - "app/**"
      - "cert-manager/**"
      - "database/**"
      - "ingress-nginx/**"
      - "monitoring/**"
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy-over-ssh:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect changed stacks
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'app/frontend/**'
            backend:
              - 'app/backend/**'
            certmanager:
              - 'cert-manager/**'
            postgres:
              - 'database/**'
            infra:
              - 'ingress-nginx/**'
            monitoring:
              - 'monitoring/**'
            all:
              - 'helmfile.yaml'

      - name: Validate GitHub secrets
        shell: bash
        run: |
          missing=0
          [[ -n "${{ secrets.SSH_HOST }}" ]] || { echo "Missing secret: SSH_HOST"; missing=1; }
          [[ -n "${{ secrets.SSH_USER }}" ]] || { echo "Missing secret: SSH_USER"; missing=1; }
          [[ -n "${{ secrets.SSH_PRIVATE_KEY }}" ]] || { echo "Missing secret: SSH_PRIVATE_KEY"; missing=1; }

          if [[ "${missing}" -ne 0 ]]; then
            exit 1
          fi

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.0
        env:
          CHANGED_FRONTEND: ${{ steps.changes.outputs.frontend }}
          CHANGED_BACKEND: ${{ steps.changes.outputs.backend }}
          CHANGED_CERTMANAGER: ${{ steps.changes.outputs.certmanager }}
          CHANGED_POSTGRES: ${{ steps.changes.outputs.postgres }}
          CHANGED_INFRA: ${{ steps.changes.outputs.infra }}
          CHANGED_MONITORING: ${{ steps.changes.outputs.monitoring }}
          CHANGED_ALL: ${{ steps.changes.outputs.all }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script_stop: true
          envs: CHANGED_FRONTEND,CHANGED_BACKEND,CHANGED_CERTMANAGER,CHANGED_POSTGRES,CHANGED_INFRA,CHANGED_MONITORING,CHANGED_ALL
          script: |
            set -euo pipefail
            cd ~/project/deploy
            git fetch --prune origin
            git checkout main
            git reset --hard origin/main
            helm version
            helmfile version
            if [ "${CHANGED_ALL}" = "true" ]; then
              helmfile sync
              kubectl apply -f ./cert-manager/cluster-issuer.yaml
              exit 0
            fi

            if [ "${CHANGED_INFRA}" = "true" ] || [ "${CHANGED_CERTMANAGER}" = "true" ]; then
              helmfile -l stack=infra sync
              kubectl apply -f ./cert-manager/cluster-issuer.yaml
            fi

            if [ "${CHANGED_POSTGRES}" = "true" ]; then
              helmfile -l app=postgres sync
            fi

            if [ "${CHANGED_BACKEND}" = "true" ]; then
              helmfile -l app=backend sync
            fi

            if [ "${CHANGED_FRONTEND}" = "true" ]; then
              helmfile -l app=frontend sync
            fi

            if [ "${CHANGED_MONITORING}" = "true" ]; then
              helmfile -l stack=monitoring sync
            fi
